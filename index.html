<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>中央大学 英語学生証画像ジェネレータ - wash@v76nl</title>
        <meta
            name="description"
            content="中央大学の英語版学生証画像を生成するツール"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="page-wrapper">
            <header class="page-header">
                <h1 class="page-title">中央大学 英語学生証画像ジェネレータ</h1>
            </header>

            <main class="app-layout">
                <!-- 左: 入力フォーム -->
                <section class="form-panel" aria-label="入力フォーム">
                    <div class="form-panel-header">入力フォーム</div>

                    <div class="form-section">
                        <h2 class="form-section-title">所属</h2>

                        <div class="form-group">
                            <label class="form-label" for="input-faculty"
                                >学部</label
                            >
                            <div class="form-select-wrapper">
                                <select class="form-select" id="input-faculty">
                                    <!-- JSで動的に生成 -->
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="input-department"
                                >学科/専攻</label
                            >
                            <div class="form-select-wrapper">
                                <select
                                    class="form-select"
                                    id="input-department"
                                >
                                    <!-- JSで動的に生成 -->
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2 class="form-section-title">個人情報</h2>

                        <div class="form-group">
                            <label class="form-label" for="input-student-id"
                                >学籍番号</label
                            >
                            <input
                                class="form-input form-input--mono"
                                type="text"
                                id="input-student-id"
                                placeholder="例: 26A1234001Z"
                                maxlength="15"
                            />
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="input-name"
                                >氏名（英語表記）</label
                            >
                            <input
                                class="form-input"
                                type="text"
                                id="input-name"
                                placeholder="例: CHU Oji"
                            />
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="input-dob"
                                >生年月日</label
                            >
                            <input
                                class="form-input"
                                type="date"
                                id="input-dob"
                            />
                        </div>
                    </div>

                    <div class="form-section">
                        <h2 class="form-section-title">在籍情報</h2>

                        <div class="form-group">
                            <label class="form-label" for="input-enrollment"
                                >入学年月日</label
                            >
                            <input
                                class="form-input"
                                type="date"
                                id="input-enrollment"
                            />
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="input-valid-until"
                                >有効期限</label
                            >
                            <input
                                class="form-input"
                                type="date"
                                id="input-valid-until"
                            />
                        </div>
                    </div>
                </section>

                <!-- 右: カードプレビュー + ダウンロード -->
                <section class="preview-panel" aria-label="プレビュー">
                    <div class="card-scaling-wrapper" id="card-scaling-wrapper">
                        <div class="card-container" id="id-card">
                            <!-- University Name (fixed) -->
                            <div class="card-university-block">
                                <div
                                    class="university-emblem"
                                    aria-hidden="true"
                                >
                                    C
                                </div>
                                <div class="university-name">
                                    Chuo University
                                </div>
                                <div class="card-type-label">
                                    STUDENT ID CARD
                                </div>
                            </div>

                            <!-- Red divider line -->
                            <div class="card-divider"></div>

                            <!-- Card body -->
                            <div class="card-body">
                                <!-- Left: student info fields -->
                                <div class="card-left">
                                    <div class="field-group">
                                        <div
                                            id="card-faculty"
                                            class="field-value is-empty"
                                            data-placeholder="学部名"
                                        ></div>
                                    </div>

                                    <div class="field-group">
                                        <div
                                            id="card-department"
                                            class="field-value is-empty"
                                            data-placeholder="学科名"
                                        ></div>
                                    </div>

                                    <div
                                        class="field-group field-group--horizontal"
                                    >
                                        <span class="field-label"
                                            >Student ID</span
                                        >
                                        <div
                                            id="card-student-id"
                                            class="field-value field-mono is-empty"
                                            data-placeholder="学籍番号"
                                        ></div>
                                    </div>

                                    <div
                                        class="field-group field-group--horizontal"
                                    >
                                        <span class="field-label">Name</span>
                                        <div
                                            id="card-name"
                                            class="field-value field-name is-empty"
                                            data-placeholder="氏名"
                                        ></div>
                                    </div>

                                    <div
                                        class="field-group field-group--horizontal"
                                    >
                                        <span class="field-label"
                                            >Date of Birth</span
                                        >
                                        <div
                                            id="card-dob"
                                            class="field-value field-mono is-empty"
                                            data-placeholder="生年月日"
                                        ></div>
                                    </div>
                                </div>

                                <!-- Right: photo + dates -->
                                <div class="card-right">
                                    <div
                                        class="photo-area"
                                        aria-label="Photo area"
                                    >
                                        <svg
                                            class="face-silhouette"
                                            viewBox="0 0 100 130"
                                            xmlns="http://www.w3.org/2000/svg"
                                            aria-hidden="true"
                                        >
                                            <path
                                                fill="rgba(148,146,172,0.48)"
                                                d="M50 4 C33 4 20 17 20 35 C20 53 33 66 50 66 C67 66 80 53 80 35 C80 17 67 4 50 4 Z M50 72 C24 72 2 83 2 100 L2 126 L98 126 L98 100 C98 83 76 72 50 72 Z"
                                            />
                                        </svg>
                                    </div>

                                    <div class="date-group">
                                        <div
                                            class="field-group field-group--compact"
                                        >
                                            <span class="field-label"
                                                >Enrollment Date</span
                                            >
                                            <div
                                                id="card-enrollment"
                                                class="field-value field-mono is-empty"
                                                data-placeholder="入学年月日"
                                            ></div>
                                        </div>

                                        <div
                                            class="field-group field-group--compact"
                                        >
                                            <span class="field-label"
                                                >Valid Until</span
                                            >
                                            <div
                                                id="card-valid-until"
                                                class="field-value field-mono is-empty"
                                                data-placeholder="有効期限"
                                            ></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Export button -->
                    <div class="export-area">
                        <button
                            id="export-btn"
                            class="export-btn"
                            type="button"
                        >
                            <svg
                                class="btn-icon"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                aria-hidden="true"
                            >
                                <path
                                    d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"
                                />
                                <polyline points="7 10 12 15 17 10" />
                                <line x1="12" y1="15" x2="12" y2="3" />
                            </svg>
                            画像をダウンロード
                        </button>
                    </div>
                </section>
            </main>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
        <script src="main.js"></script>
    </body>
</html>
